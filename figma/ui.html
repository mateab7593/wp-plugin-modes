<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WP Plugin Modes</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/figma-plugin-ds/dist/figma-plugin-ds.css"
    />
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: Inter, sans-serif;
        background-color: var(--figma-color-bg, #ffffff);
        color: var(--figma-color-text, #000000);
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }

      .header h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
      }

      .section {
        margin-bottom: 16px;
      }

      .section label {
        display: block;
        font-size: 11px;
        font-weight: 500;
        margin-bottom: 4px;
        color: var(--figma-color-text-secondary, #666666);
      }

      .btn-primary {
        background: var(--figma-color-bg-brand, #18a0fb);
        color: #ffffff;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }

      .btn-primary:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>WP Plugin Modes</h1>
    </div>

    <div class="section">
      <p style="font-size: 12px; margin: 0 0 16px">
        Use this plugin to manage WordPress plugin modes directly from Figma.
      </p>
    </div>

    <div class="section">
      <button class="btn-primary" id="close-btn">Close Plugin</button>
    </div>

    <script>
      document.getElementById('close-btn').addEventListener('click', () => {
        parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
      });
    </script>
  </body>
</html>
